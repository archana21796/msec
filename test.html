<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custom Dropdown Show/Hide with CSS and JS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
  /* Initially hide dropdown menu */
  .dropdown-menu {
    display: none;
  }

  /* Show dropdown menu when 'show' class is added */
  .dropdown-menu.show {
    display: block;
  }
</style>
</head>
<body>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Custom toggle for dropdown menu display
  const aboutLink = document.getElementById('dropdownMenuLink');
  const dropdownMenu = aboutLink.nextElementSibling; // the ul.dropdown-menu

  aboutLink.addEventListener('click', function(e) {
    e.preventDefault();

    // Toggle the 'show' class on the dropdown menu
    dropdownMenu.classList.toggle('show');

    // Update aria-expanded attribute for accessibility
    const isShown = dropdownMenu.classList.contains('show');
    aboutLink.setAttribute('aria-expanded', isShown);
  });

  // Optional: close dropdown if clicking outside
  document.addEventListener('click', function(e) {
    if (!aboutLink.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.classList.remove('show');
      aboutLink.setAttribute('aria-expanded', 'false');
    }
  });
</script>

</body>
</html>
